syntax = "proto3";

package beaconnode.v1;

message AgentRegistration {
  string agent_id = 1;
  string node_id = 2;
  string endpoint = 3;
  map<string, string> metadata = 4;
  uint64 revision = 5;
  uint64 expires_at_unix_ms = 6;
  bytes public_key = 7;
  bytes signature = 8;
}

message NodeIdentity {
  string node_id = 1;
  bytes public_key = 2;
}

message Heartbeat {
  string agent_id = 1;
  string node_id = 2;
  uint64 revision = 3;
  uint64 observed_at_unix_ms = 4;
  bytes signature = 5;
}

message RegistrySnapshot {
  repeated AgentRegistration agents = 1;
}

message GossipEnvelope {
  string sender_node_id = 1;
  uint64 sent_at_unix_ms = 2;
  repeated AgentRegistration push_entries = 3;
  uint64 pull_after_revision = 4;
}

message FramedMessage {
  string protocol = 1;
  uint32 version = 2;
  bytes payload = 3;
}

message ControlRequest {
  oneof body {
    AgentRegistration register_agent = 1;
    Heartbeat heartbeat = 2;
    ListAgentsRequest list_agents = 3;
    SyncPullRequest sync_pull = 4;
    AgentRegistration sync_merge = 5;
    StatsRequest stats = 6;
  }
}

message ListAgentsRequest {
  string metadata_key = 1;
  string metadata_value = 2;
}

message ControlResponse {
  bool ok = 1;
  string message = 2;
  RegistrySnapshot snapshot = 3;
}

message SyncPullRequest {
  uint64 after_revision = 1;
  uint32 limit = 2;
}

message StatsRequest {}
